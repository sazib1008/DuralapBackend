version: '3.8'

services:
  # The Core Backend Service
  api-service:
    build: .
    image: duralap-backend:latest
    container_name: duralap_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      # MongoDB (Must match Atlas or local)
      - "SPRING_DATA_MONGODB_URI=mongodb+srv://sazib1008:qHJ9ecgQPqNsS3NY@cluster0.fjyvxzs.mongodb.net/duralap?appName=Cluster0"
      # Redis (Cache, PubSub signaling)
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_SSL_ENABLED=false
      - SPRING_DATA_REDIS_USERNAME=default
      - SPRING_DATA_REDIS_PASSWORD=
      # Kafka (Event architecture)
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      - redis
      - kafka
    networks:
      - duralap_network

  # Distributed Cache & Fast I/O WebRTC Signaling Broker
  redis:
    image: redis:7.2-alpine
    container_name: duralap_redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    networks:
      - duralap_network

  # Event Driven Message Broker Layer
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: duralap_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - duralap_network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: duralap_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - duralap_network

networks:
  duralap_network:
    driver: bridge
