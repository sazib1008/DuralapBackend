spring.data.redis.password=${REDIS_PASSWORD:GBjkRHNqulrxF3TNLir65XJekw6pKtYe}
spring.data.redis.ssl.enabled=false

# Redis Connection Pool Optimization
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=5
spring.data.redis.lettuce.pool.max-wait=2000ms
spring.data.redis.timeout=3000ms

# JWT Configuration
app.jwt.secret=${JWT_SECRET:mySuperSecretKeyForDuralapAppWhichIsVerySecureAndLongEnoughForHS512}
app.jwt.expiration-in-ms=${JWT_EXPIRATION:86400000}
app.jwt.refresh-expiration-in-ms=${JWT_REFRESH_EXPIRATION:604800000}

# Server configuration
server.port=${SERVER_PORT:8080}
server.tomcat.max-threads=200
server.tomcat.min-spare-threads=20
server.tomcat.max-connections=10000
server.tomcat.accept-count=100
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024

# Observability Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.tracing.sampling.probability=1.0
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.example.duralap.security=INFO
logging.level.com.example.duralap.service=INFO

# Kafka Configuration
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Kafka Producer Optimization
spring.kafka.producer.batch-size=16384
spring.kafka.producer.buffer-memory=33554432
spring.kafka.producer.linger-ms=5
spring.kafka.producer.compression-type=snappy

# Kafka Consumer Optimization
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.max-poll-records=500
spring.kafka.listener.ack-mode=record
spring.kafka.listener.concurrency=3

# Jackson Optimization
spring.jackson.default-property-inclusion=non_null
