spring.application.name=duralap

# MongoDB connection
spring.data.mongodb.uri=....
# Redis connection
spring.data.redis.host=......
spring.data.redis.port=16687
spring.data.redis.username=default
spring.data.redis.password=IQ7zsPZlUblNxXoKPtzeR6H541EEjyXU
spring.data.redis.ssl.enabled=true

# JWT Configuration
app.jwt.secret=${JWT_SECRET:mySuperSecretKeyForDuralapAppWhichIsVerySecureAndLongEnoughForHS512}
app.jwt.expiration-in-ms=${JWT_EXPIRATION:86400000}
app.jwt.refresh-expiration-in-ms=${JWT_REFRESH_EXPIRATION:604800000}

# Server configuration
server.port=8080

# Observability Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.tracing.sampling.probability=1.0
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.example.duralap.security=DEBUG

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
