spring.data.mongodb.socket-timeout=5000
spring.data.mongodb.connect-timeout=5000
spring.data.mongodb.max-connection-life-time=60000
spring.data.mongodb.max-connections-per-host=100
spring.data.mongodb.min-connections-per-host=10



# Redis connection
spring.data.redis.host=${REDIS_HOST:redis-16274.crce280.asia-south1-1.gcp.cloud.redislabs.com}
spring.data.redis.port=${REDIS_PORT:16274}
